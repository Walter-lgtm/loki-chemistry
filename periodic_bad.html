    <style>
        :root { --br-green: #1f4722; --neon-green: #2ecc71; --bg-black: #0a0f0d; }
        body { background: var(--bg-black); color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--neon-green); padding-bottom: 10px; }
        .header h1 { font-size: 2rem; letter-spacing: 5px; color: var(--neon-green); text-shadow: 0 0 15px var(--neon-green); margin: 0; }
        .main-layout { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .periodic-table { display: grid; grid-template-columns: repeat(18, 50px); grid-auto-rows: 60px; gap: 5px; background: rgba(31, 71, 34, 0.05); padding: 10px; border: 1px solid #1a1a1a; overflow-x: auto; }
        .element { background: rgba(0, 0, 0, 0.8); border: 1px solid var(--br-green); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; position: relative; width: 50px; height: 60px; }
        .element:hover { background: var(--br-green); box-shadow: 0 0 15px var(--neon-green); z-index: 10; transform: scale(1.1); }
        .element .num { font-size: 0.6rem; position: absolute; top: 3px; left: 5px; color: var(--neon-green); }
        .element .sym { font-size: 1.2rem; font-weight: bold; color: #fff; }
        .element .name { font-size: 0.4rem; text-transform: uppercase; opacity: 0.7; text-align: center; }
        .info-panel { width: 300px; background: #111; border: 2px solid var(--neon-green); padding: 20px; border-radius: 10px; box-shadow: 0 0 30px rgba(46, 204, 113, 0.2); min-height: 300px; }
        .data-label { color: var(--neon-green); font-weight: bold; }
        .data-row { margin: 10px 0; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="header">
    <h1><span style="background: var(--br-green); padding: 0 10px;">He</span>isenberg <span style="background: var(--br-green); padding: 0 10px;">Ta</span>ble</h1>
</div>

    function buildTable() {
        const table = document.getElementById('table');
        elements.forEach(el => {
            const div = document.createElement('div');
            div.className = 'element';
            div.style.gridColumn = el.x;
            div.style.gridRow = el.y;
            div.innerHTML = `<span class="num">${el.n}</span><span class="sym">${el.s}</span><span class="name">${el.name}</span>`;
            div.onclick = () => {
                document.getElementById('details').innerHTML = `
                    <div class="data-row"><span class="data-label">СИМВОЛ:</span> ${el.s}</div>
                    <div class="data-row"><span class="data-label">NAME:</span> ${el.name}</div>
                    <div class="data-row"><span class="data-label">LATIN:</span> <i>${el.lat}</i></div>
                    <div class="data-row"><span class="data-label">МАССА:</span> ${el.m}</div>
                    <div class="data-row"><span class="data-label">ВАЛЕНТНОСТЬ:</span> ${el.v}</div>
                    <div class="data-row"><span class="data-label">КОНФИГУРАЦИЯ:</span><br>${el.c}</div>
                `;
            };
            table.appendChild(div);
        });
    }
    buildTable();
