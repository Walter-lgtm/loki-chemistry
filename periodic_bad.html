<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L & ⅂ | HEISENBERG TABLE</title>
    <style>
        :root { --br-green: #1f4722; --neon-green: #2ecc71; --bg-black: #0a0f0d; }
        body { background: var(--bg-black); color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 20px; overflow-x: hidden; }
        
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--neon-green); padding-bottom: 10px; }
        .header h1 { font-size: 2.5rem; letter-spacing: 5px; color: var(--neon-green); text-shadow: 0 0 15px var(--neon-green); margin: 0; }

        .main-layout { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }

        /* СЕТКА ТАБЛИЦЫ: 18 ГРУПП */
        .periodic-table { 
            display: grid; 
            grid-template-columns: repeat(18, 55px); 
            grid-auto-rows: 65px; /* Ряды будут добавляться сами */
            gap: 5px; 
            background: rgba(31, 71, 34, 0.05);
            padding: 10px;
            border: 1px solid #1a1a1a;
            overflow-x: auto; /* Чтобы на мобилках можно было листать вбок */
        }

        .element { 
            background: rgba(0, 0, 0, 0.8); 
            border: 1px solid var(--br-green); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: 0.3s;
            position: relative;
        }

        .element:hover { 
            background: var(--br-green); 
            box-shadow: 0 0 15px var(--neon-green); 
            z-index: 10; 
            transform: scale(1.1);
        }

        .element .num { font-size: 0.6rem; position: absolute; top: 3px; left: 5px; color: var(--neon-green); }
        .element .sym { font-size: 1.4rem; font-weight: bold; color: #fff; }
        .element .name { font-size: 0.5rem; text-transform: uppercase; opacity: 0.7; }

        /* ИНФО-ПАНЕЛЬ */
        .info-panel { 
            width: 300px; 
            background: #111; 
            border: 2px solid var(--neon-green); 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.2);
            min-height: 300px;
        }

        .info-panel h2 { color: var(--neon-green); border-bottom: 1px solid #333; padding-bottom: 10px; }
        .data-row { margin: 15px 0; font-size: 0.9rem; }
        .data-label { color: var(--neon-green); font-weight: bold; }

        /* ПОЗИЦИОНИРОВАНИЕ (Пример для первых элементов) */
        .h { grid-column: 1; grid-row: 1; }
        .he { grid-column: 18; grid-row: 1; }
        .li { grid-column: 1; grid-row: 2; }
        .be { grid-column: 2; grid-row: 2; }
        /* ... и так далее для всех 118 ... */
    </style>
</head>
<body>

<div class="header">
    <h1><span style="background: var(--br-green); padding: 0 10px;">He</span>isenberg <span style="background: var(--br-green); padding: 0 10px;">Ta</span>ble</h1>
</div>

<div class="main-layout">
    <div class="periodic-table" id="table">
        <!-- ГЕНЕРАЦИЯ ЭЛЕМЕНТОВ JS -->
    </div>

    <div class="info-panel" id="info">
        <h2>ДАННЫЕ ОБЪЕКТА</h2>
        <div id="details">Выберите элемент для анализа...</div>
    </div>
</div>

<script>
    const URL_PIECE1 = "https://raw.githubusercontent.com";
    const URL_PIECE2 = "Bowserinator/Periodic-Table-JSON/master/";
    const URL_PIECE3 = "PeriodicTableJSON.json";

    const FULL_URL = URL_PIECE1 + URL_PIECE2 + URL_PIECE3;

    fetch(FULL_URL)
        .then(res => res.json())
        .then(data => {
            const table = document.getElementById('table');
            data.elements.forEach(el => {
                const div = document.createElement('div');
                div.className = 'element';
                
                // Координаты из базы: xpos - группа (1-18), ypos - период (1-7)
                div.style.gridColumn = el.xpos;
                div.style.gridRow = el.ypos;
                
                // Если элемент из Лантаноидов или Актиноидов (нижние ряды)
                if (el.period > 7) {
                    div.style.gridRow = el.period + 1; // Сдвигаем их вниз для красоты
                }

                div.innerHTML = `
                    <span class="num">${el.number}</span>
                    <span class="sym">${el.symbol}</span>
                    <span class="name" style="font-size:0.4rem">${el.name}</span>
                `;
                
                div.onclick = () => {
                    const details = document.getElementById('details');
                    details.innerHTML = `
                        <div class="data-row"><span class="data-label">СИМВОЛ:</span> ${el.symbol}</div>
                        <div class="data-row"><span class="data-label">НАЗВАНИЕ:</span> ${el.name}</div>
                        <div class="data-row"><span class="data-label">МАССА:</span> ${el.atomic_mass.toFixed(3)}</div>
                        <div class="data-row"><span class="data-label">КАТЕГОРИЯ:</span> ${el.category}</div>
                        <div class="data-row"><span class="data-label">КОНФИГУРАЦИЯ:</span><br>${el.electron_configuration || 'N/A'}</div>
                    `;
                };
                table.appendChild(div);
            });
        })
        .catch(err => console.error("Сбой резонанса:", err));
</script>

</body>
</html>
