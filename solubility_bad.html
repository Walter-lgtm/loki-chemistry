<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L & ⅂ | Чистая Химия: Растворимость</title>
    <style>
        :root { --emerald: #2ecc71; --dark: #0a0f0d; --gold: #f1c40f; --blue: #3498db; --rust: #e67e22; }
        body { background: var(--dark); color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .header { text-align: center; border-bottom: 2px solid var(--emerald); width: 100%; max-width: 1000px; padding: 10px 0; margin-bottom: 15px; }
        .header h1 { color: var(--emerald); text-shadow: 0 0 15px var(--emerald); margin: 0; font-size: 1.5rem; }

        /* РЯД БЕКЕТОВА */
        .beketov-row { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; background: #111; padding: 10px; border: 1px solid var(--gold); border-radius: 5px; }
        .metal { padding: 5px 8px; border: 1px solid #333; font-size: 0.8rem; cursor: help; transition: 0.3s; }
        .metal:hover { background: var(--gold); color: #000; box-shadow: 0 0 10px var(--gold); }
        .active { color: var(--emerald); } .noble { color: #e74c3c; }

        .main-content { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; width: 100%; }

        /* ТАБЛИЦА */
        .table-wrap { overflow-x: auto; background: #111; padding: 10px; border: 1px solid var(--emerald); border-radius: 8px; }
        table { border-collapse: collapse; text-align: center; cursor: default; }
        th, td { border: 1px solid #222; width: 45px; height: 45px; font-size: 0.8rem; position: relative; }
        th { color: var(--emerald); font-weight: bold; background: #000; }
        .res-p { color: var(--emerald); opacity: 0.4; } /* Растворимо */
        .res-n { font-weight: bold; cursor: pointer; transition: 0.3s; } /* Нерастворимо */
        .res-n:hover { transform: scale(1.1); z-index: 5; box-shadow: 0 0 10px #fff; }
        .res-m { color: var(--gold); } /* Малорастворимо */
        
        /* ПАНЕЛЬ ИНФО */
        .info-panel { width: 280px; background: #111; border: 2px solid var(--emerald); border-radius: 10px; padding: 20px; box-shadow: 0 0 30px rgba(46, 204, 113, 0.1); }
        .color-preview { width: 100%; height: 80px; border-radius: 5px; margin: 15px 0; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-weight: bold; text-shadow: 1px 1px 2px #000; }
    </style>
</head>
<body>

<div class="header">
    <h1><span style="background:#1f4722; padding:0 10px;">So</span>lubility: Pure Chemistry</h1>
</div>

<div class="beketov-row" id="beketov">
    <!-- Ряд активности металлов -->
    <span class="metal active">Li</span><span class="metal active">K</span><span class="metal active">Ba</span><span class="metal active">Ca</span><span class="metal active">Na</span><span class="metal active">Mg</span><span class="metal active">Al</span>
    <span class="metal">Zn</span><span class="metal">Cr</span><span class="metal">Fe</span><span class="metal">Ni</span><span class="metal">Sn</span><span class="metal">Pb</span>
    <span class="metal" style="color:white; font-weight:bold; border:1px solid white;">(H)</span>
    <span class="metal noble">Cu</span><span class="metal noble">Hg</span><span class="metal noble">Ag</span><span class="metal noble">Pt</span><span class="metal noble">Au</span>
</div>

<div class="main-content">
    <div class="table-wrap">
        <table id="solTable">
            <!-- Генерируется через JS -->
        </table>
    </div>

    <div class="info-panel" id="info">
        <h2 style="color:var(--emerald); margin-top:0;">АНАЛИЗ ОСАДКА</h2>
        <div id="details">Выберите нерастворимое соединение (Н)...</div>
        <div id="preview" class="color-preview" style="display:none;"></div>
    </div>
</div>

<script>
    const anions = ["OH⁻", "Cl⁻", "Br⁻", "I⁻", "S²⁻", "SO₃²⁻", "SO₄²⁻", "CO₃²⁻", "SiO₃²⁻", "PO₄³⁻", "NO₃⁻"];
    const cations = [
        { s: "H⁺", r: ["P","P","P","P","P","P","P","P","Н","P","P"] },
        { s: "Na⁺", r: ["P","P","P","P","P","P","P","P","P","P","P"] },
        { s: "K⁺", r: ["P","P","P","P","P","P","P","P","P","P","P"] },
        { s: "NH₄⁺", r: ["P","P","P","P","P","P","P","P","-","P","P"] },
        { s: "Mg²⁺", r: ["Н","P","P","P","P","P","P","Н","Н","Н","P"] },
        { s: "Ca²⁺", r: ["М","P","P","P","P","М","М","Н","Н","Н","P"] },
        { s: "Ba²⁺", r: ["P","P","P","P","P","Н","Н","Н","Н","Н","P"] },
        { s: "Al³⁺", r: ["Н","P","P","P","-","Н","P","Н","Н","Н","P"] },
        { s: "Fe²⁺", r: ["Н","P","P","P","Н","Н","P","Н","Н","Н","P"] },
        { s: "Fe³⁺", r: ["Н","P","P","P","Н","-","P","-","Н","Н","P"] },
        { s: "Cu²⁺", r: ["Н","P","P","-","Н","Н","P","-","Н","Н","P"] },
        { s: "Ag⁺", r: ["-","Н","Н","Н","Н","Н","М","Н","Н","Н","P"] },
        { s: "Zn²⁺", r: ["Н","P","P","P","Н","Н","P","Н","Н","Н","P"] }
    ];

    const sedimentInfo = {
        "Cu²⁺-OH⁻": { color: "#3498db", desc: "Голубой студенистый осадок. Разлагается при нагревании." },
        "Fe³⁺-OH⁻": { color: "#a0522d", desc: "Бурый аморфный осадок. Типичный признак солей железа(III)." },
        "Ag⁺-Cl⁻": { color: "#ffffff", desc: "Белый творожистый осадок. Темнеет на свету. Нерастворим в HNO₃." },
        "Ba²⁺-SO₄²⁻": { color: "#ffffff", desc: "Белый мелкокристаллический осадок. Нерастворим в сильных кислотах." },
        "Ag⁺-I⁻": { color: "#f1c40f", desc: "Желтый творожистый осадок. Нерастворим в растворе аммиака." },
        "Fe²⁺-S²⁻": { color: "#2c3e50", desc: "Черный осадок. Растворяется в разбавленных кислотах." },
        "H⁺-SiO₃²⁻": { color: "#ecf0f1", desc: "Белый гелеобразный осадок (кремниевая кислота)." }
    };

    function buildTable() {
        const table = document.getElementById('solTable');
        let html = "<tr><th></th>" + anions.map(a => `<th>${a}</th>`).join('') + "</tr>";
        
        cations.forEach(c => {
            html += `<tr><th>${c.s}</th>`;
            c.r.forEach((res, i) => {
                let cls = res === "P" ? "res-p" : (res === "Н" ? "res-n" : "res-m");
                let colorAttr = sedimentInfo[`${c.s}-${anions[i]}`] ? `onclick="showInfo('${c.s}','${anions[i]}')"` : "";
                let style = res === "Н" && sedimentInfo[`${c.s}-${anions[i]}`] ? `style="color:${sedimentInfo[`${c.s}-${anions[i]}`].color}"` : "";
                html += `<td class="${cls}" ${colorAttr} ${style}>${res}</td>`;
            });
            html += "</tr>";
        });
        table.innerHTML = html;
    }

    function showInfo(c, a) {
        const key = `${c}-${a}`;
        const info = sedimentInfo[key];
        const det = document.getElementById('details');
        const prev = document.getElementById('preview');
        
        if (info) {
            det.innerHTML = `<b>Соединение:</b> ${c.replace(/²⁺|³⁺|⁺/g, '')}${a.replace(/⁻|²⁻|³⁻/g, '')}<br><br>${info.desc}`;
            prev.style.display = "flex";
            prev.style.background = info.color;
            prev.style.color = (info.color === "#ffffff") ? "#000" : "#fff";
            prev.innerText = "ЦВЕТ ОСАДКА";
        }
    }

    buildTable();
</script>

</body>
</html>
