<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>L & ⅂ — ИНКВИЗИТОР [ХИМИЯ 8]</title>
    <!-- СКЛЕЙ ЭТУ ССЫЛКУ В ОДНУ СТРОКУ В АТРИБУТЕ SRC -->
    <script src="https://https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --main-cyan: #00d4ff; --bg-dark: #0b0e14; --panel-bg: #161b22; }
        body { background: var(--bg-dark); color: #e0e0e0; font-family: 'Courier New', monospace; padding: 20px; user-select: none; }
        .container { max-width: 850px; margin: auto; border: 1px solid #444; padding: 30px; background: var(--panel-bg); box-shadow: 0 0 30px rgba(0,212,255,0.15); border-radius: 8px; }
        h1 { color: var(--main-cyan); text-align: center; text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid var(--main-cyan); padding-bottom: 10px; }
        .info-block { display: flex; gap: 10px; margin-bottom: 30px; }
        input[type="text"] { background: #0d1117; border: 1px solid #444; color: var(--main-cyan); padding: 12px; width: 100%; border-radius: 4px; outline: none; }
        .question { margin-bottom: 20px; padding: 20px; border-left: 4px solid var(--main-cyan); background: #1c2128; border-radius: 0 8px 8px 0; }
        .btn { background: var(--main-cyan); color: #000; padding: 18px; border: none; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; margin-top: 20px; }
    </style>
</head>
<body oncontextmenu="return false">

<div class="container">
    <h1>КИСЛОТЫ: СОСТАВ И НОМЕНКЛАТУРА</h1>
    <div class="info-block">
        <input type="text" id="studentName" placeholder="Имя и первая буква Фамилии" autocomplete="off">
        <input type="text" id="studentClass" placeholder="Класс" style="width: 150px;" autocomplete="off">
    </div>
    <div id="quiz-area"></div>
    <button class="btn" onclick="generateInquisitionPDF()">ЗАВЕРШИТЬ И СФОРМИРОВАТЬ СЕРТИФИКАТ</button>
</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwi3xoN1FJI4P3Y8tr8v2CPPeP6g731jb-opzEj654JXV8QHGbUiqs9NF4oismS13YnOg/exec";

const variants = [
    { id: 1, q1: "LiOH, H2SO4, NaCl, HNO3, CaO, H3PO4", q2: "HCl, HBr, HI, H2S, H2SO4", q3: "H2CO3", q4: "H2SO3", q5: "H2SO4 (до десятых)" },
    { id: 2, q1: "K2O, HCl, NaOH, H2SO3, MgCl2, HNO2", q2: "H2SO4, H2CO3, H3PO4, H2SO3, HCl", q3: "HNO3", q4: "H3PO4", q5: "HNO3 (до десятых)" },
    { id: 3, q1: "HI, Ba(OH)2, H2S, KNO3, SO3, HBr", q2: "HCl, HBr, HI, H2S, HNO3", q3: "H2S", q4: "HCl", q5: "HCl (до десятых)" },
    { id: 4, q1: "HNO3, Na2O, H2CO3, KOH, H3PO4, LiCl", q2: "HNO3, HCl, HI, HBr, H2SO4", q3: "H3PO4", q4: "HNO3", q5: "H3PO4 (до целых)" },
    { id: 5, q1: "H2SO4, Ca(OH)2, HF, Na2SO4, H2SiO3, P2O5", q2: "H2SO4, H2CO3, H2S, H2SiO3, HCl", q3: "HCl", q4: "H2CO3", q5: "H2CO3 (до десятых)" },
    { id: 6, q1: "HBr, MgO, H2SO3, BaCl2, HNO2, NaOH", q2: "H2SO4, H2SO3, H2CO3, H2SiO3, H3PO4", q3: "H2SO4", q4: "HF", q5: "H2S (до целых)" },
    { id: 7, q1: "H2S, KOH, H2CO3, NaCl, HNO3, FeO", q2: "HCl, HBr, HI, HF, H2SO4", q3: "HNO2", q4: "HI", q5: "HBr (до целых)" },
    { id: 8, q1: "HI, Al2O3, H3PO4, KCl, H2SO4, LiOH", q2: "HCl, HBr, HI, HF, H2CO3", q3: "HI", q4: "H2SiO3", q5: "HI (до целых)" },
    { id: 9, q1: "HF, BaO, HNO2, K2SO4, H2S, Ca(OH)2", q2: "HNO3, HNO2, H2SO4, H2SO3, HCl", q3: "HF", q4: "HBr", q5: "HF (до целых)" },
    { id: 10, q1: "H2SiO3, NaOH, HCl, Na2CO3, H3PO4, MgO", q2: "HCl, HBr, HI, HF, H2S", q3: "H2SO3", q4: "HNO2", q5: "H2SO3 (до десятых)" }
];

const currentVar = variants[Math.floor(Math.random() * variants.length)];

function render() {
    document.getElementById('quiz-area').innerHTML = `
        <p style="color:var(--main-cyan)">ВАРИАНТ №${currentVar.id}</p>
        <div class="question"><b>1. Формулы кислот из:</b> ${currentVar.q1}<br><input type="text" id="a1"></div>
        <div class="question"><b>2. Лишнее в ряду:</b> ${currentVar.q2}<br><input type="text" id="a2"></div>
        <div class="question"><b>3. Назовите:</b> ${currentVar.q3}<br><input type="text" id="a3"></div>
        <div class="question"><b>4. Остаток и валентность:</b> ${currentVar.q4}<br><input type="text" id="a4"></div>
        <div class="question"><b>5. w(H) в %:</b> ${currentVar.q5}<br><input type="text" id="a5"></div>
    `;
}
render();

async function generateInquisitionPDF() {
    const name = document.getElementById('studentName').value;
    const cls = document.getElementById('studentClass').value;
    if(!name || !cls) { alert("Пожалуйста, введите Имя и первую букву Фамилии!"); return; }

    const payload = {
        name, className: cls, variantId: currentVar.id,
        ans1: document.getElementById('a1').value,
        ans2: document.getElementById('a2').value,
        ans3: document.getElementById('a3').value,
        ans4: document.getElementById('a4').value,
        ans5: document.getElementById('a5').value
    };

    fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text("Гимназия №1 «Универс» — Протокол", 20, 20);
    doc.text(`Ученик: ${name} | Класс: ${cls} | Вариант: ${currentVar.id}`, 20, 30);
    
    let y = 50;
    const questions = [currentVar.q1, currentVar.q2, currentVar.q3, currentVar.q4, currentVar.q5];
    for(let i=0; i<5; i++) {
        doc.text(`Вопрос ${i+1}: ${questions[i]}`, 20, y);
        doc.text(`Ответ: ${document.getElementById('a'+(i+1)).value}`, 25, y+7);
        y += 20;
    }
    doc.text("Проверил: _________ Оценка: ___ Подпись: ___", 20, y+10);
    doc.save(`Result_${name}.pdf`);
}
</script>
</body>
</html>
