<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гимназия №1 «Универс» — Химия 8</title>
    <style>
        :root { --ice: #00d4ff; --dark-bg: #0b0e14; --panel: #161b22; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: #e0e0e0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: var(--panel); padding: 30px; border-radius: 8px; border: 1px solid #444; }
        h1 { color: var(--ice); text-align: center; border-bottom: 2px solid var(--ice); padding-bottom: 10px; }
        .info-block { display: flex; gap: 15px; margin-bottom: 30px; }
        input[type="text"] { background: #0d1117; border: 1px solid #444; color: var(--ice); padding: 12px; width: 100%; border-radius: 4px; outline: none; }
        .question { margin-bottom: 25px; padding: 20px; border-left: 4px solid var(--ice); background: #1c2128; }
        .btn-opt { background: #2c333a; color: white; border: 1px solid #444; padding: 10px 15px; margin: 5px; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .btn-opt.selected { background: var(--ice); color: black; font-weight: bold; border-color: white; }
        .finish-btn { background: var(--ice); color: black; padding: 18px; border: none; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; }
        @media print { .finish-btn, input, .btn-opt { display: none !important; } .selected { display: inline-block !important; border: 1px solid black !important; padding: 5px !important; } body { background: white; color: black; } .container { border: none; } .print-only { display: block !important; } }
        .print-only { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="print-only" id="ph" style="font-weight: bold; margin-bottom: 20px;"></div>
    <h1>Кислоты: Состав и Номенклатура</h1>
    <div class="info-block">
        <input type="text" id="studentName" placeholder="Имя и первая буква Фамилии">
        <input type="text" id="studentClass" placeholder="Класс">
    </div>
    <div id="quiz-area"></div>
    <button class="finish-btn" onclick="finishInquisition()">ЗАВЕРШИТЬ И СОХРАНИТЬ РЕЗУЛЬТАТ</button>
</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyUuuSWPPNzDfKy7iXUy3DzgRtMArBvJmLhvt9R65XnjEW-Rt4fCbiU2N6RO4hl_YI77Q/exec";
const variants = [
    { id: 1, q1: ["LiOH", "H<sub>2</sub>SO<sub>4</sub>", "NaCl", "HNO<sub>3</sub>", "CaO", "H<sub>3</sub>PO<sub>4</sub>"], a1: ["H<sub>2</sub>SO<sub>4</sub>", "HNO<sub>3</sub>", "H<sub>3</sub>PO<sub>4</sub>"], q2: ["HCl", "HBr", "HI", "H<sub>2</sub>S", "H<sub>2</sub>SO<sub>4</sub>"], a2: "H<sub>2</sub>SO<sub>4</sub>", q3: "H<sub>2</sub>CO<sub>3</sub>", a3: "угольная", q4: "H<sub>2</sub>SO<sub>3</sub>", a4: "so3, ii", q5: "H<sub>2</sub>SO<sub>4</sub>", a5: "2.0" },
    { id: 2, q1: ["K<sub>2</sub>O", "HCl", "NaOH", "H<sub>2</sub>SO<sub>3</sub>", "MgCl<sub>2</sub>", "HNO<sub>2</sub>"], a1: ["HCl", "H<sub>2</sub>SO<sub>3</sub>", "HNO<sub>2</sub>"], q2: ["H<sub>2</sub>SO<sub>4</sub>", "H<sub>2</sub>CO<sub>3</sub>", "H<sub>3</sub>PO<sub>4</sub>", "H<sub>2</sub>SO<sub>3</sub>", "HCl"], a2: "HCl", q3: "HNO<sub>3</sub>", a3: "азотная", q4: "H<sub>3</sub>PO<sub>4</sub>", a4: "po4, iii", q5: "HNO<sub>3</sub>", a5: "1.6" },
    { id: 3, q1: ["HI", "Ba(OH)<sub>2</sub>", "H<sub>2</sub>S", "KNO<sub>3</sub>", "SO<sub>3</sub>", "HBr"], a1: ["HI", "H<sub>2</sub>S", "HBr"], q2: ["HCl", "HBr", "HI", "H<sub>2</sub>S", "HNO<sub>3</sub>"], a2: "HNO<sub>3</sub>", q3: "H<sub>2</sub>S", a3: "сероводородная", q4: "HCl", a4: "cl, i", q5: "HCl", a5: "2.7" },
    { id: 4, q1: ["HNO<sub>3</sub>", "Na<sub>2</sub>O", "H<sub>2</sub>CO<sub>3</sub>", "KOH", "H<sub>3</sub>PO<sub>4</sub>", "LiCl"], a1: ["HNO<sub>3</sub>", "H<sub>2</sub>CO<sub>3</sub>", "H<sub>3</sub>PO<sub>4</sub>"], q2: ["HNO<sub>3</sub>", "HCl", "HI", "HBr", "H<sub>2</sub>SO<sub>4</sub>"], a2: "H<sub>2</sub>SO<sub>4</sub>", q3: "H<sub>3</sub>PO<sub>4</sub>", a3: "фосфорная", q4: "HNO<sub>3</sub>", a4: "no3, i", q5: "H<sub>3</sub>PO<sub>4</sub>", a5: "3" },
    { id: 5, q1: ["H<sub>2</sub>SO<sub>4</sub>", "Ca(OH)<sub>2</sub>", "HF", "Na<sub>2</sub>SO<sub>4</sub>", "H<sub>2</sub>SiO<sub>3</sub>", "P<sub>2</sub>O<sub>5</sub>"], a1: ["H<sub>2</sub>SO<sub>4</sub>", "HF", "H<sub>2</sub>SiO<sub>3</sub>"], q2: ["H<sub>2</sub>SO<sub>4</sub>", "H<sub>2</sub>CO<sub>3</sub>", "H<sub>2</sub>S", "H<sub>2</sub>SiO<sub>3</sub>", "HCl"], a2: "HCl", q3: "HCl", a3: "соляная", q4: "H<sub>2</sub>CO<sub>3</sub>", a4: "co3, ii", q5: "H<sub>2</sub>CO<sub>3</sub>", a5: "3.2" },
    { id: 6, q1: ["HBr", "MgO", "H<sub>2</sub>SO<sub>3</sub>", "BaCl<sub>2</sub>", "HNO<sub>2</sub>", "NaOH"], a1: ["HBr", "H<sub>2</sub>SO<sub>3</sub>", "HNO<sub>2</sub>"], q2: ["H<sub>2</sub>SO<sub>4</sub>", "H<sub>2</sub>SO<sub>3</sub>", "H<sub>2</sub>CO<sub>3</sub>", "H<sub>2</sub>SiO<sub>3</sub>", "H<sub>3</sub>PO<sub>4</sub>"], a2: "H<sub>3</sub>PO<sub>4</sub>", q3: "H<sub>2</sub>SO<sub>4</sub>", a3: "серная", q4: "HF", a4: "f, i", q5: "H<sub>2</sub>S", a5: "6" },
    { id: 7, q1: ["H<sub>2</sub>S", "KOH", "H<sub>2</sub>CO<sub>3</sub>", "NaCl", "HNO<sub>3</sub>", "FeO"], a1: ["H<sub>2</sub>S", "H<sub>2</sub>CO<sub>3</sub>", "HNO<sub>3</sub>"], q2: ["HCl", "HBr", "HI", "HF", "H<sub>2</sub>SO<sub>4</sub>"], a2: "H<sub>2</sub>SO<sub>4</sub>", q3: "HNO<sub>2</sub>", a3: "азотистая", q4: "HI", a4: "i, i", q5: "HBr", a5: "1" },
    { id: 8, q1: ["HI", "Al<sub>2</sub>O<sub>3</sub>", "H<sub>3</sub>PO<sub>4</sub>", "KCl", "H<sub>2</sub>SO<sub>4</sub>", "LiOH"], a1: ["HI", "H<sub>3</sub>PO<sub>4</sub>", "H<sub>2</sub>SO<sub>4</sub>"], q2: ["HCl", "HBr", "HI", "HF", "H<sub>2</sub>CO<sub>3</sub>"], a2: "H<sub>2</sub>CO<sub>3</sub>", q3: "HI", a3: "йодоводородная", q4: "H<sub>2</sub>SiO<sub>3</sub>", a4: "sio3, ii", q5: "HI", a5: "1" },
    { id: 9, q1: ["HF", "BaO", "HNO<sub>2</sub>", "K<sub>2</sub>SO<sub>4</sub>", "H<sub>2</sub>S", "Ca(OH)<sub>2</sub>"], a1: ["HF", "HNO<sub>2</sub>", "H<sub>2</sub>S"], q2: ["HNO<sub>3</sub>", "HNO<sub>2</sub>", "H<sub>2</sub>SO<sub>4</sub>", "H<sub>2</sub>SO<sub>3</sub>", "HCl"], a2: "HCl", q3: "HF", a3: "фтороводородная", q4: "HBr", a4: "br, i", q5: "HF", a5: "5" },
    { id: 10, q1: ["H<sub>2</sub>SiO<sub>3</sub>", "NaOH", "HCl", "Na<sub>2</sub>CO<sub>3</sub>", "H<sub>3</sub>PO<sub>4</sub>", "MgO"], a1: ["H<sub>2</sub>SiO<sub>3</sub>", "HCl", "H<sub>3</sub>PO<sub>4</sub>"], q2: ["HCl", "HBr", "HI", "HF", "H<sub>2</sub>S"], a2: "H<sub>2</sub>S", q3: "H<sub>2</sub>SO<sub>3</sub>", a3: "сернистая", q4: "HNO<sub>2</sub>", a4: "no2, i", q5: "H<sub>2</sub>SO<sub>3</sub>", a5: "2.4" }
];

const currentVar = variants[Math.floor(Math.random() * variants.length)];
let selectedQ1 = [];
let selectedQ2 = "";

function render() {
    const area = document.getElementById('quiz-area');
    area.innerHTML = `
        <p style="color:var(--ice)"><b>АКТИВИРОВАН ВАРИАНТ №${currentVar.id}</b></p>
        
        <div class="question">
            <b>Задание 1.</b> Из предложенного списка веществ выберите только формулы кислот:
            <div class="options-grid">
                ${currentVar.q1.map(f => `<button class="btn-opt" onclick="toggleQ1(this, '${f}')">${f}</button>`).join('')}
            </div>
        </div>

        <div class="question">
            <b>Задание 2.</b> Определите «лишнее» вещество в ряду:
            <div class="options-grid">
                ${currentVar.q2.map(f => `<button class="btn-opt btn-q2" onclick="selectQ2(this, '${f}')">${f}</button>`).join('')}
            </div>
        </div>

        <div class="question"><b>Задание 3.</b> Напишите название кислоты для формулы: <b>${currentVar.q3}</b><br><br><input type="text" id="a3" placeholder="Ваш ответ..."></div>
        
        <div class="question"><b>Задание 4.</b> Для кислоты <b>${currentVar.q4}</b> укажите формулу кислотного остатка и его валентность:<br><br><input type="text" id="a4" placeholder="Напр: SO4, II"></div>
        
        <div class="question"><b>Задание 5.</b> Вычислите массовую долю водорода (в %) в соединении: <b>${currentVar.q5}</b><br><br><input type="text" id="a5" placeholder="Напр: 2.0"></div>
    `;
}

function toggleQ1(btn, val) {
    btn.classList.toggle('selected');
    if (selectedQ1.includes(val)) selectedQ1 = selectedQ1.filter(i => i !== val);
    else selectedQ1.push(val);
}

function selectQ2(btn, val) {
    document.querySelectorAll('.btn-q2').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedQ2 = val;
}

function finishInquisition() {
    let score = 0;
    // Логика проверки
    if (selectedQ1.sort().join(',') === currentVar.a1.sort().join(',')) score++;
    if (selectedQ2 === currentVar.a2) score++;
    if (document.getElementById('a3').value.toLowerCase().trim() === currentVar.a3) score++;
    if (document.getElementById('a4').value.toLowerCase().trim().includes(currentVar.a4)) score++;
    if (document.getElementById('a5').value.replace(',','.').trim() === currentVar.a5) score++;

    const grade = score >= 5 ? "5" : score >= 4 ? "4" : score >= 3 ? "3" : "2";
    
    fetch(GOOGLE_SCRIPT_URL, {
        method: "POST", mode: "no-cors",
        body: JSON.stringify({
            name: document.getElementById('studentName').value,
            className: document.getElementById('studentClass').value,
            totalScore: score, grade: grade
        })
    });

    document.getElementById('ph').innerHTML = `Гимназия №1 | Результат: ${score}/5 | Оценка: ${grade}`;
    window.print();
}
render();
</script>
</body>
</html>
