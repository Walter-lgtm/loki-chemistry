<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>L & ⅂ — ИНКВИЗИТОР [ХИМИЯ 8]</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        body { background: #0b0e14; color: #e0e0e0; font-family: 'Courier New', monospace; padding: 20px; user-select: none; }
        .container { max-width: 800px; margin: auto; border: 1px solid #444; padding: 30px; background: #161b22; box-shadow: 0 0 20px rgba(0,255,255,0.1); }
        h1 { color: #00d4ff; text-align: center; border-bottom: 2px solid #00d4ff; }
        .question { margin-bottom: 25px; padding: 15px; border-left: 3px solid #00d4ff; background: #1c2128; }
        input[type="text"] { background: #0d1117; border: 1px solid #444; color: #fff; padding: 8px; width: 100%; box-sizing: border-box; }
        .btn { background: #00d4ff; color: #000; padding: 15px 30px; border: none; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; }
        .btn:hover { background: #fff; }
        #result { margin-top: 20px; display: none; }
    </style>
</head>
<body oncontextmenu="return false" oncopy="return false" onselectstart="return false">

<div class="container">
    <h1>ДИРЕКТИВА: КИСЛОТЫ (ВПР-8)</h1>
    <div id="user-info">
        <input type="text" id="studentName" placeholder="ФИО ученика" required><br><br>
        <input type="text" id="studentClass" placeholder="Класс (например, 8А)" required>
    </div>

    <div id="quiz-area">
        <!-- Сюда скрипт вставит случайный вариант -->
    </div>

    <button class="btn" onclick="finishInquisition()">ЗАВЕРШИТЬ ЖАТВУ</button>
    <div id="result"></div>
</div>

<script>
// БАЗА ДАННЫХ ВАРИАНТОВ (L & ⅂ — DATA)
const variants = [
    {
        id: 1,
        q1: "LiOH, H2SO4, NaCl, HNO3, CaO, H3PO4",
        ans1: "H2SO4, HNO3, H3PO4",
        q2: "HCl, HBr, HI, H2S, H2SO4. Какое лишнее?",
        ans2: "H2SO4",
        q3: "Назовите H2CO3:",
        ans3: "угольная",
        q4: "H2SO3: остаток и его валентность?",
        ans4: "SO3, II",
        q5: "Массовая доля H в H2SO4 (в %, до десятых):",
        ans5: "2.0"
    },
    // Тут Локи добавит остальные 9 вариантов по аналогии...
];

const currentVar = variants[Math.floor(Math.random() * variants.length)];

// Отрисовка теста
function renderQuiz() {
    const area = document.getElementById('quiz-area');
    area.innerHTML = `
        <h3>ВАРИАНТ №${currentVar.id}</h3>
        <div class="question">1. Выпишите формулы кислот через запятую:<br><b>${currentVar.q1}</b><br><input type="text" id="ans1"></div>
        <div class="question">2. Исключите лишнее (объяснение кратко):<br><b>${currentVar.q2}</b><br><input type="text" id="ans2"></div>
        <div class="question">3. Назовите кислоту:<br><b>${currentVar.q3}</b><br><input type="text" id="ans3"></div>
        <div class="question">4. Кислотный остаток и его валентность:<br><b>${currentVar.q4}</b><br><input type="text" id="ans4"></div>
        <div class="question">5. Расчетная задача:<br><b>${currentVar.q5}</b><br><input type="text" id="ans5"></div>
    `;
}

renderQuiz();

function finishInquisition() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const name = document.getElementById('studentName').value;
    const cls = document.getElementById('studentClass').value;
    
    // ЛОГИКА ПРОВЕРКИ (Упрощенная для примера)
    let score = 0;
    if(document.getElementById('ans1').value.includes('H2SO4')) score++; 
    // ... логика баллов ...

    // ГЕНЕРАЦИЯ PDF
    doc.setFontSize(18);
    doc.text("РЕЗУЛЬТАТ ПРОВЕРОЧНОЙ РАБОТЫ (L & ⅂)", 20, 20);
    doc.setFontSize(12);
    doc.text(`Ученик: ${name} | Класс: ${cls}`, 20, 35);
    doc.text(`Дата: ${new Date().toLocaleDateString()}`, 20, 42);
    
    doc.text("--------------------------------------------------", 20, 50);
    doc.text(`Задание 1: ${document.getElementById('ans1').value}`, 20, 60);
    doc.text(`Задание 2: ${document.getElementById('ans2').value}`, 20, 70);
    doc.text(`Задание 3: ${document.getElementById('ans3').value}`, 20, 80);
    doc.text(`Задание 4: ${document.getElementById('ans4').value}`, 20, 90);
    doc.text(`Задание 5: ${document.getElementById('ans5').value}`, 20, 100);
    
    doc.text("--------------------------------------------------", 20, 115);
    doc.text(`ИТОГОВЫЙ БАЛЛ: ${score}`, 20, 125);
    doc.text("Проверил: _________________  Оценка: _____  Подпись: _________", 20, 140);

    doc.save(`Chemistry_Result_${name}.pdf`);
    alert("Жатва окончена. Сертификат загружен.");
}
</script>

</body>
</html>
